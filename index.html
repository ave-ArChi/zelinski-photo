<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zelinski Photo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Zelinski Photo</h1>
    <nav>
      <a href="#about">О себе</a>
      <a href="#gallery">Галерея</a>
      <a href="#pricing">Прайс-лист</a>
    </nav>
  </header>

  <main>
    <section id="about">
      <h2>О себе</h2>
      <p>Привет! Я фотограф, создающий эмоциональные и выразительные кадры. Моё портфолио охватывает портретную, репортажную и художественную фотографию.</p>
    </section>

    <section id="gallery">
      <h2>Галерея</h2>
      <div class="gallery">
        <img src="images/photo1.png" alt="Фото 1">
        <img src="images/photo2.png" alt="Фото 2">
      </div>
    </section>

    <section id="pricing">
      <h2>Прайс-лист</h2>
      <div class="pricing">
        <div class="price-card">
          <h3>Мини</h3>
          <p>15 000 ₽</p>
        </div>
        <div class="price-card">
          <h3>Стандарт</h3>
          <p>30 000 ₽</p>
        </div>
        <div class="price-card">
          <h3>Макси</h3>
          <p>50 000 ₽</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Zelinski Photo</p>
  </footer>
</body>
</html>
